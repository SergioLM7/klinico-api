spring:
  application:
    name: klinico-api
  datasource:
    url: jdbc:postgresql://localhost:5434/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: validate # 'validate' porque ya creamos las tablas con el script SQL
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: "optional:file:.env[.properties]"
server:
  forward-headers-strategy: native

logging:
  level:
    org:
      hibernate:
        SQL=DEBUG: